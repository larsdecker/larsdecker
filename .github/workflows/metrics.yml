name: Metrics
on:
  schedule: [{cron: "0 0 */7 * *"}]
  push: {branches: ["main"]}
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          template: classic
          base: header, activity, community, repositories
          base_indepth: yes
          config_timezone: Europe/Berlin
          plugin_languages: yes
